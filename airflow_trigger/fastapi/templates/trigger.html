<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>실행</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #20242a;
    }

    main {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    section {
      width: min(420px, 100%);
      border: 1px solid #d9dee7;
      border-radius: 8px;
      background: #ffffff;
      padding: 28px;
      box-shadow: 0 12px 28px rgba(20, 28, 38, 0.08);
      text-align: center;
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 18px;
      border: 4px solid #dbe1ea;
      border-top-color: #2f6fed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: #5a6472;
      word-break: break-word;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <div class="spinner" aria-hidden="true"></div>
      <h1>실행 중</h1>
      <p><strong>{{ display_name }}</strong> 작업이 끝날 때까지 기다려 주세요.</p>
    </section>
  </main>
  <script>
    async function run() {
      try {
        const dagId = {{ dag_id | tojson }};
        const params = new URLSearchParams({ dag_id: dagId, wait: "true" });
        const response = await fetch("/api/trigger?" + params.toString(), {
          headers: { "Accept": "application/json" }
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          alert("작업 실행에 실패했습니다. 담당자에게 문의해 주세요.");
          closePage();
          return;
        }
        alert("작업이 완료되었습니다.\n이 창이 자동으로 닫히지 않으면 직접 닫아 주세요.");
        closePage();
      } catch (error) {
        alert("작업 실행에 실패했습니다. 담당자에게 문의해 주세요.");
        closePage();
      }
    }

    function closePage() {
      window.open("", "_self");
      window.close();
      setTimeout(() => {
        document.body.innerHTML = "";
        location.replace("about:blank");
      }, 300);
    }

    run();
  </script>
</body>
</html>
