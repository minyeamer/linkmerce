selectors:

  # Airflow Dags - cj_loisparcel
  - name: cj_loisparcel_invoice
    description: "'cj_loisparcel_invoice' DAG 실행 결과를 반영하기 위한 CJ 송장 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/delivery
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__sales_daily
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - coupang
  - name: coupang_adreport
    description: "'coupang' >> 'coupang_adreport' DAG 실행 결과를 반영하기 위한 쿠팡 광고 실적 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__insight_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: coupang_campaign
    description: "'coupang' >> 'coupang_campaign' DAG 실행 결과를 반영하기 위한 쿠팡 광고 마스터 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__campaign_master
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__adgroup_master
        # `coupang_ads.creative` 테이블을 업데이트하는 경우 아래 후속 모델을 활성화한다.
        # - method: fqn
        #   value: intermediate.ads.coupang_ads.coupang_ads__insight_daily
        # - method: fqn
        #   value: marts.sales.analytics__sales_daily
  - name: coupang_rocket_sales
    description: "'coupang' >> 'coupang_rocket_sales' DAG 실행 결과를 반영하기 위한 쿠팡 로켓정산 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/coupang_rfm
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - ecount
  - name: ecount_product
    description: "'ecount_product' DAG 실행 결과를 반영하기 위한 상품 기준 매출 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.sales.coupang_rfm.coupang_rfm__sales_daily
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__sales_daily
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - google_ads
  - name: google_ads
    description: "'google_ads' DAG 실행 결과를 반영하기 위한 구글 광고 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/ads/google_ads
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - meta_ads
  - name: meta_ads
    description: "'meta_ads' DAG 실행 결과를 반영하기 위한 메타 광고 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/ads/meta_ads
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - sabangnet
  - name: sabangnet_invoice
    description: "'sabangnet_invoice' DAG 실행 결과를 반영하기 위한 사방넷 송장 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/sabangnet
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: sabangnet_order
    description: "'sabangnet_order' DAG 실행 결과를 반영하기 위한 사방넷 주문 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/sabangnet
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: sabangnet_product
    description: "'sabangnet_product' DAG 실행 결과를 반영하기 위한 사방넷 상품/매핑 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/sabangnet
        - method: path
          value: models/intermediate/sales/smartstore
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - searchad
  - name: searchad_contract
    description: "'searchad_contract' DAG 실행 결과를 반영하기 위한 검색광고 계약 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: searchad_master_gfa
    description: "'searchad_master_gfa' DAG 실행 결과를 반영하기 위한 GFA 광고 마스터 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__campaign_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__adgroup_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__ad_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_daily
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: searchad_master_sad
    description: "'searchad_master_sad' DAG 실행 결과를 반영하기 위한 검색광고 마스터 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__campaign_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__adgroup_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__ad_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_daily
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: searchad_report_gfa
    description: "'searchad_report_gfa' DAG 실행 결과를 반영하기 위한 GFA 광고 실적 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: searchad_report_sad
    description: "'searchad_report_sad' DAG 실행 결과를 반영하기 위한 검색광고 실적 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - smartstore
  - name: smartstore_invoice
    description: "'smartstore_invoice' DAG 실행 결과를 반영하기 위한 스마트스토어 배송 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: smartstore_order
    description: "'smartstore_order' DAG 실행 결과를 반영하기 위한 스마트스토어 주문 후속 모델"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/smartstore
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - sync_gsheets
  - name: sync_gsheets__expense
    description: "'sync_gsheets__expense' DAG 실행 결과를 반영하기 위한 고정지출 후속 모델"
    definition:
      union:
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: sync_gsheets__extra_ads
    description: "'sync_gsheets__extra_ads' DAG 실행 결과를 반영하기 위한 기타광고 후속 모델"
    definition:
      union:
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: sync_gsheets__extra_sales
    description: "'sync_gsheets__extra_sales' DAG 실행 결과를 반영하기 위한 기타매출 후속 모델"
    definition:
      union:
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: sync_gsheets__opex
    description: "'sync_gsheets__opex' DAG 실행 결과를 반영하기 위한 운영비용 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.core__opex_daily
        - method: fqn
          value: marts.sales.analytics__sales_daily
  - name: sync_gsheets__order_status
    description: "'sync_gsheets__order_status' DAG 실행 결과를 반영하기 위한 주문상태 후속 모델"
    definition:
      union:
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__sales_daily
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__order_count
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__order_count
        - method: fqn
          value: marts.sales.analytics__sales_daily

  # Airflow Dags - sync_gsheets__ads_master
  - name: coupang_ads_master
    description: "쿠팡 광고 캠페인/광고그룹 마스터 모델 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__campaign_master
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__adgroup_master
  - name: google_ads_master
    description: "구글 광고 캠페인/광고그룹/소재 마스터 모델 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.google_ads.google_ads__campaign_master
        - method: fqn
          value: intermediate.ads.google_ads.google_ads__adgroup_master
        - method: fqn
          value: intermediate.ads.google_ads.google_ads__ad_master
  - name: meta_ads_master
    description: "메타 광고 캠페인/광고세트/광고 마스터 모델 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.meta_ads.meta_ads__campaign_master
        - method: fqn
          value: intermediate.ads.meta_ads.meta_ads__adset_master
        - method: fqn
          value: intermediate.ads.meta_ads.meta_ads__ad_master
  - name: searchad_master
    description: "네이버 검색광고 캠페인/광고그룹/소재 마스터 모델 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__campaign_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__adgroup_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__ad_master

  # Custom
  - name: profit
    description: "영업이익 테이블 함수 모델 업데이트"
    definition:
      union:
        - method: fqn
          value: marts.sales.analytics__profit_base
        - method: fqn
          value: marts.sales.analytics__profit_daily
        - method: fqn
          value: marts.sales.analytics__profit_mom
        - method: fqn
          value: marts.sales.analytics__profit_monthly
  - name: coupang_master
    description: "쿠팡 옵션 마스터 모델 업데이트"
    definition:
      union:
        - method: fqn
          value: marts.product.coupang__option_master
  - name: smartstore_master
    description: "스마트스토어 상품/옵션 마스터 모델 업데이트"
    definition:
      union:
        - method: fqn
          value: marts.product.smartstore__product_master
        - method: fqn
          value: marts.product.smartstore__option_master
