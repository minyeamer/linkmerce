selectors:

  # Airflow Dags - cj_eflexs
  - name: cj_eflexs_stock
    description: "'cj_eflexs_stock' DAG 실행 후 CJ 풀필먼트 재고수량 변동을 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.stock.sources.cj_eflexs__stock_qty_batch
        - method: fqn
          value: intermediate.stock.core__sold_qty_30d_daily
        - method: fqn
          value: intermediate.stock.core__stock_qty_batch
        - method: fqn
          value: intermediate.stock.core__stock_time_batch

  # Airflow Dags - cj_loisparcel
  - name: cj_loisparcel_invoice
    description: "'cj_loisparcel_invoice' DAG 실행 후 CJ 송장번호 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/delivery
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__sales_daily
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - coupang
  - name: coupang_adreport
    description: "'coupang' >> 'coupang_adreport' DAG 실행 후 쿠팡 광고 실적 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__insight_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: coupang_campaign
    description: "'coupang' >> 'coupang_campaign' DAG 실행 후 쿠팡 광고 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__campaign_master
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__adgroup_master
        # `coupang_ads.creative` 테이블을 업데이트하는 경우 아래 후속 모델을 활성화한다.
        # - method: fqn
        #   value: intermediate.ads.coupang_ads.coupang_ads__insight_daily
        # - method: fqn
        #   value: intermediate.sales.core__sales_daily
  - name: coupang_inventory
    description: "'coupang' >> 'coupang_inventory' DAG 실행 후 쿠팡 로켓 재고수량 변동을 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.stock.sources.coupang_rfm__stock_qty_batch
        - method: fqn
          value: intermediate.stock.core__sold_qty_30d_daily
        - method: fqn
          value: intermediate.stock.core__stock_qty_batch
        - method: fqn
          value: intermediate.stock.core__stock_time_batch
  - name: coupang_rocket_sales
    description: "'coupang' >> 'coupang_rocket_sales' DAG 실행 후 쿠팡 로켓정산 내역 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/coupang_rfm
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - ecount
  - name: ecount_inventory
    description: "'ecount_inventory' DAG 실행 후 이카운트 재고수량 변동을 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.stock.sources.ecount__stock_qty_batch
        - method: fqn
          value: intermediate.stock.core__sold_qty_30d_daily
        - method: fqn
          value: intermediate.stock.core__stock_qty_batch
        - method: fqn
          value: intermediate.stock.core__stock_time_batch
  - name: ecount_product
    description: "'ecount_product' DAG 실행 후 상품별 원가 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.sales.coupang_rfm.coupang_rfm__sales_daily
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__sales_daily
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
        - method: fqn
          value: intermediate.stock.core__stock_qty_batch

  # Airflow Dags - google_ads
  - name: google_ads
    description: "'google_ads' DAG 실행 후 구글 광고 목록 및 실적 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/ads/google_ads
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - meta_ads
  - name: meta_ads
    description: "'meta_ads' DAG 실행 후 메타 광고 목록 및 실적 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/ads/meta_ads
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - sabangnet
  - name: sabangnet_invoice
    description: "'sabangnet_invoice' DAG 실행 후 사방넷 송장번호 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/sabangnet
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: sabangnet_order
    description: "'sabangnet_order' DAG 실행 후 사방넷 주문 내역 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/sabangnet
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: sabangnet_product
    description: "'sabangnet_product' DAG 실행 후 사방넷 상품/매핑 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/sabangnet
        - method: path
          value: models/intermediate/sales/smartstore
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - searchad
  - name: searchad_contract
    description: "'searchad_contract' DAG 실행 후 네이버 검색광고 계약 정보 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: searchad_master_gfa
    description: "'searchad_master_gfa' DAG 실행 후 네이버 성과형 광고 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__campaign_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__adgroup_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__ad_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_daily
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: searchad_master_sad
    description: "'searchad_master_sad' DAG 실행 후 네이버 검색광고 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__campaign_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__adgroup_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__ad_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__contract_daily
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: searchad_report_gfa
    description: "'searchad_report_gfa' DAG 실행 후 네이버 성과형 광고 실적 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: searchad_report_sad
    description: "'searchad_report_sad' DAG 실행 후 네이버 검색광고 실적 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__insight_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - smartstore
  - name: smartstore_invoice
    description: "'smartstore_invoice' DAG 실행 후 스마트스토어 송장번호 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: smartstore_order
    description: "'smartstore_order' DAG 실행 후 스마트스토어 주문 내역 변동을 매출에 반영"
    definition:
      union:
        - method: path
          value: models/intermediate/sales/smartstore
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - sync_gsheets
  - name: sync_gsheets__expense
    description: "'sync_gsheets__expense' DAG 실행 후 고정지출 변동을 매출에 반영"
    definition:
      method: fqn
      value: intermediate.sales.core__sales_daily
  - name: sync_gsheets__extra_ads
    description: "'sync_gsheets__extra_ads' DAG 실행 후 기타광고 변동을 매출에 반영"
    definition:
      method: fqn
      value: intermediate.sales.core__sales_daily
  - name: sync_gsheets__extra_sales
    description: "'sync_gsheets__extra_sales' DAG 실행 후 기타매출 변동을 매출에 반영"
    definition:
      method: fqn
      value: intermediate.sales.core__sales_daily
  - name: sync_gsheets__opex
    description: "'sync_gsheets__opex' DAG 실행 후 운영비용 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.core__opex_daily
        - method: fqn
          value: intermediate.sales.core__sales_daily
  - name: sync_gsheets__order_status
    description: "'sync_gsheets__order_status' DAG 실행 후 주문상태 변동을 매출에 반영"
    definition:
      union:
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__sales_daily
        - method: fqn
          value: intermediate.sales.sabangnet.sabangnet__order_count
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__sales_daily
        - method: fqn
          value: intermediate.sales.smartstore.smartstore__order_count
        - method: fqn
          value: intermediate.sales.core__sales_daily

  # Airflow Dags - sync_gsheets__ads_master
  - name: coupang_ads_master
    description: "쿠팡 광고 캠페인/광고그룹 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__campaign_master
        - method: fqn
          value: intermediate.ads.coupang_ads.coupang_ads__adgroup_master
  - name: google_ads_master
    description: "구글 광고 캠페인/광고그룹/소재 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.google_ads.google_ads__campaign_master
        - method: fqn
          value: intermediate.ads.google_ads.google_ads__adgroup_master
        - method: fqn
          value: intermediate.ads.google_ads.google_ads__ad_master
  - name: meta_ads_master
    description: "메타 광고 캠페인/광고세트/광고 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.meta_ads.meta_ads__campaign_master
        - method: fqn
          value: intermediate.ads.meta_ads.meta_ads__adset_master
        - method: fqn
          value: intermediate.ads.meta_ads.meta_ads__ad_master
  - name: searchad_master
    description: "네이버 검색광고 캠페인/광고그룹/소재 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.ads.searchad.searchad__campaign_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__adgroup_master
        - method: fqn
          value: intermediate.ads.searchad.searchad__ad_master

  # Custom
  - name: order_count
    description: "일별 주문 내역 업데이트"
    definition:
      method: fqn
      value: marts.sales.analytics__order_count
      parents: true
  - name: sales
    description: "일별 매출 보고서 업데이트"
    definition:
      method: fqn
      value: intermediate.sales.core__sales_daily
      parents: true
  - name: profit
    description: "일별 영업이익 보고서 업데이트"
    definition:
      method: fqn
      value: marts.sales.analytics__profit_base
      children: true
  - name: stock
    description: "재고수량 및 기간 판매량 업데이트"
    definition:
      union:
        - method: fqn
          value: intermediate.stock.core__sold_qty_30d_daily
        - method: fqn
          value: intermediate.stock.core__stock_qty_batch
          parents: true
        - method: fqn
          value: intermediate.stock.core__stock_time_batch
  - name: stock_report
    description: "재고-소비기한 보고서 업데이트"
    definition:
      union:
        - method: fqn
          value: marts.stock.analytics__stock_report
        - method: fqn
          value: marts.stock.analytics__stock_report_ds
        - method: fqn
          value: marts.stock.analytics__stock_time_ds
  - name: coupang_master
    description: "쿠팡 옵션 목록 업데이트"
    definition:
      method: fqn
      value: marts.product.coupang__option_master
  - name: smartstore_master
    description: "스마트스토어 상품/옵션 목록 업데이트"
    definition:
      union:
        - method: fqn
          value: marts.product.smartstore__product_master
        - method: fqn
          value: marts.product.smartstore__option_master
