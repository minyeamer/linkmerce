---
services:
  postgres:
    image: ${POSTGRES_IMAGE_NAME:-custom/postgres:18}
    container_name: linkmerce-postgres
    shm_size: ${POSTGRES_SHM_SIZE:-1g}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linkmerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linkmerce}
      POSTGRES_DB: ${POSTGRES_DB:-linkmerce}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data}:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-linkmerce}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
